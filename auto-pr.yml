name: Auto Create PR

on:
  push:
    branches-ignore:
      - main
      - master
      - develop
      - "release/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr-if-missing:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR if missing
        uses: actions/github-script@v7
        env:
          BRANCH_NAME: ${{ github.ref_name }}
          BASE_BRANCH: develop
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;
            const headBranch = process.env.BRANCH_NAME;
            const baseBranch = process.env.BASE_BRANCH;

            if (!headBranch || headBranch === baseBranch) {
              core.info(`Skipping PR creation for head branch: ${headBranch}`);
              return;
            }

            const head = `${owner}:${headBranch}`;
            const existing = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head,
              base: baseBranch,
            });

            if (existing.data.length > 0) {
              core.info(`Open PR already exists for ${head} -> ${baseBranch}.`);
              return;
            }

            const fallbackTitle = require('child_process')
              .execSync('git log -1 --pretty=%s')
              .toString()
              .trim();

            const title = (process.env.COMMIT_MESSAGE || fallbackTitle || `chore: update ${headBranch}`).trim();
            const body = fs.readFileSync('.github/PULL_REQUEST_TEMPLATE.md', 'utf8');

            const created = await github.rest.pulls.create({
              owner,
              repo,
              title,
              body,
              head: headBranch,
              base: baseBranch,
            });

            core.info(`Created PR #${created.data.number}: ${created.data.html_url}`);
