name: MindForge Observability

on:
  workflow_run:
    workflows: ["MindForge CI"]
    types:
      - completed

jobs:
  metrics:
    name: Collect Run Metrics
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event.workflow_run.conclusion == 'failure' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci

      - name: Analyze Session Quality
        run: |
          echo "::group::Observability Analysis"
          # Extract metrics from audit logs if they exist
          node -e "
            const fs = require('fs');
            const metrics = {
              timestamp: new Date().toISOString(),
              run_id: '${{ github.run_id }}',
              conclusion: '${{ github.event.workflow_run.conclusion }}',
              token_usage: 0,
              success_rate: 0
            };
            if (fs.existsSync('.planning/AUDIT.jsonl')) {
              const logs = fs.readFileSync('.planning/AUDIT.jsonl', 'utf8').split('\n').filter(Boolean).map(JSON.parse);
              metrics.token_usage = logs.reduce((sum, l) => sum + (l.tokens || 0), 0);
              metrics.success_rate = logs.filter(l => l.status === 'success').length / logs.length || 0;
            }
            fs.writeFileSync('session-quality.json', JSON.stringify(metrics, null, 2));
            console.log('Metrics collected: ', metrics);
          "
          echo "::endgroup::"

      - name: Generate Observability Summary
        run: |
          {
            echo "# 📊 MindForge Workflow Observability"
            echo ""
            echo "### Run Details"
            echo "- **Workflow:** ${{ github.event.workflow_run.name }}"
            echo "- **Conclusion:** ${{ github.event.workflow_run.conclusion }}"
            echo "- **Link:** [View Workflow Run](${{ github.event.workflow_run.html_url }})"
            echo ""
            echo "### Resource Usage"
            if [ -f "session-quality.json" ]; then
              node -e "
                const m = JSON.parse(require('fs').readFileSync('session-quality.json'));
                console.log('- **Estimated Token Usage:** ' + m.token_usage);
                console.log('- **Agent Success Rate:** ' + (m.success_rate * 100).toFixed(1) + '%');
              "
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload Metrics
        uses: actions/upload-artifact@v7
        with:
          name: mindforge-metrics-${{ github.run_id }}
          path: |
            session-quality.json
            .planning/AUDIT.jsonl
