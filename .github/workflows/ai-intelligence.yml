name: MindForge AI Intelligence

on:
  workflow_call:

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: 🤖 Multi-Model Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci

      - name: Cross-Model Review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node bin/mindforge-cli.js cross-review --models claude,gpt4o --focus security,architecture --output markdown > /tmp/review-summary.md

      - name: Publish Review Comment
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/review-summary.md', 'utf8');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Upload Review Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-review-reports
          path: |
            CODE-REVIEW.md
            CROSS-REVIEW.md
