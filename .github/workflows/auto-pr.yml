name: MindForge Auto-PR

on:
  push:
    branches-ignore:
      - main
      - master
      - develop
      - "release/**"

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR if missing
        uses: actions/github-script@v9
        env:
          BRANCH_NAME: ${{ github.ref_name }}
          # MindForge develops against `develop` (main is intentionally left behind), so
          # auto-PRs target develop, not main.
          BASE_BRANCH: develop
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;
            const headBranch = process.env.BRANCH_NAME;
            const baseBranch = process.env.BASE_BRANCH;

            if (!headBranch || headBranch === baseBranch) {
              core.info(`Skipping PR creation for head branch: ${headBranch}`);
              return;
            }

            // Match an existing OPEN PR for this head regardless of base — a PR already
            // open (e.g. to develop) means there is nothing to create.
            const head = `${owner}:${headBranch}`;
            const existing = await github.rest.pulls.list({ owner, repo, state: 'open', head });

            if (existing.data.length > 0) {
              core.info(`Open PR already exists for ${head} (#${existing.data[0].number}).`);
              return;
            }

            // Detect template
            let body = '';
            const templatePath = '.github/pull_request_template.md';
            if (fs.existsSync(templatePath)) {
              body = fs.readFileSync(templatePath, 'utf8');
            } else {
              core.warning(`PR template not found at ${templatePath}`);
              body = 'Draft PR created by MindForge Auto-PR Engine.';
            }

            const title = (process.env.COMMIT_MESSAGE || `feat: update ${headBranch}`).split('\n')[0].trim();

            // Creating a PR can 403 when the repo/org policy "Allow GitHub Actions to create
            // and approve pull requests" is off. That is a policy choice, not a CI failure —
            // log a notice and exit cleanly rather than reding the check. (Open the PR manually,
            // or enable the policy / provide a PAT to fully automate.)
            try {
              const created = await github.rest.pulls.create({
                owner, repo, title, body, head: headBranch, base: baseBranch, draft: true,
              });
              core.info(`Created Draft PR #${created.data.number}: ${created.data.html_url}`);
            } catch (err) {
              core.notice(`Auto-PR skipped (${err.status || 'error'}): ${err.message}. Open the PR manually or enable Actions PR-creation.`);
            }
