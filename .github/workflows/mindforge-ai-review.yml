name: MindForge AI Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ai-reviewer:
    name: Cross-Model Code Review
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'needs-review') || github.event_name == 'pull_request'
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run AI Review
        id: review
        run: |
          echo "::group::AI Review Execution"
          # Run the cross-review engine with designated models
          node bin/review/cross-review-engine.js --models claude,gpt4o --output json > /tmp/review-results.json
          echo "::endgroup::"
          
          # Generate review markdown
          node -e "
            const results = JSON.parse(require('fs').readFileSync('/tmp/review-results.json', 'utf8'));
            const md = '# 🧠 MindForge AI Review\n\n' + 
                       '## Summary\n' + results.summary + '\n\n' +
                       '## Findings\n' + results.findings.map(f => '- ' + f).join('\n');
            require('fs').writeFileSync('/tmp/mindforge-review.md', md);
          "

      - name: Post AI Review Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reviewContent = fs.readFileSync('/tmp/mindforge-review.md', 'utf8');
            
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              body: reviewContent,
              event: 'COMMENT'
            });

      - name: Upload Review Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-review-reports
          path: |
            CODE-REVIEW.md
            CROSS-REVIEW.md
