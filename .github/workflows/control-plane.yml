name: MindForge Control Plane

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  classify:
    name: 🔍 Change Classification
    runs-on: ubuntu-latest
    outputs:
      tier: ${{ steps.classifier.outputs.tier }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci

      - name: Run Classifier
        id: classifier
        run: node bin/change-classifier.js

      - name: Tier Summary
        run: |
          echo "### 🔍 Change Classification Result" >> $GITHUB_STEP_SUMMARY
          echo "- **Governance Tier:** ${{ steps.classifier.outputs.tier }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.classifier.outputs.tier }}" == "3" ]; then
            echo "- ⚠️ **High Risk Changes Detected** — Tier 3 Governance Gate Enforced." >> $GITHUB_STEP_SUMMARY
          fi

  governance-gate:
    name: ⚖️ Governance Enforcement
    needs: classify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check Tier 3 Compliance
        if: needs.classify.outputs.tier == '3'
        run: |
          # Tier-3 gate (v11.5.1): do NOT just count approval files — a hand-committed
          # empty/fake file would pass a count check. Require at least one approval whose
          # identity_verification.verified === true (matching approve.js's fail-closed
          # record), and reject if ANY committed approval is unverified.
          node -e '
            const fs = require("fs"), path = require("path");
            const dir = ".planning/approvals";
            let files = [];
            try { files = fs.readdirSync(dir).filter(f => f.endsWith(".json")); } catch { files = []; }
            if (files.length === 0) {
              console.error("❌ ERROR: Tier 3 changes detected but no approval found in .planning/approvals/");
              console.error("Run /mindforge:approve (with a GPG signing key) and commit the approval file.");
              process.exit(1);
            }
            let verified = 0;
            for (const f of files) {
              let rec;
              try { rec = JSON.parse(fs.readFileSync(path.join(dir, f), "utf8")); }
              catch { console.error(`❌ ERROR: approval ${f} is not valid JSON`); process.exit(1); }
              const iv = rec && rec.identity_verification;
              if (!iv || iv.verified !== true) {
                console.error(`❌ ERROR: approval ${f} is UNVERIFIED (identity_verification.verified !== true).`);
                console.error("   A Tier 3 gate requires a GPG-verified approval; unverified records are rejected.");
                process.exit(1);
              }
              if (!rec.signature) {
                console.error(`❌ ERROR: approval ${f} is missing its signature.`);
                process.exit(1);
              }
              verified++;
            }
            console.log(`✅ Tier 3 approval verified (${verified} verified approval file(s)).`);
          '

      - name: Security Scan
        run: node bin/mindforge-cli.js security-scan

  routing:
    name: 🚀 Pipeline Routing
    needs: [classify, governance-gate]
    if: needs.governance-gate.result == 'success'
    uses: ./.github/workflows/execution-plane.yml
    secrets: inherit

  ai-review:
    name: 🤖 AI Intelligence Layer
    needs: [classify, governance-gate]
    if: github.event_name == 'pull_request' && needs.governance-gate.result == 'success'
    uses: ./.github/workflows/ai-intelligence.yml
    secrets: inherit
